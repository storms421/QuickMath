<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick Math</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Main Menu -->
  <div id="main-menu">
    <h1>Quick Math</h1>

    <button id="start-game">Start Game</button>
    <button id="show-leaderboard">Leaderboard</button>
    <button id="show-achievements">Achievements</button>

  </div>

  <div id="game" class="hidden">

    <p id="timer">60</p>
    <p id="score">0 Correct</p>

    <h2 id="problem">Problem Box</h2>

    <button id="option1">Option 1</button>
    <button id="option2">Option 2</button>
    <button id="option3">Option 3</button>
    <button id="option4">Option 4</button>

    <div id="penalty">

    </div>

  </div>

  <div id="results" class="hidden">

    <h2>Results</h2>

    <p id="player-score">0</p>

    <ol id="results-leaderboard-list">

    </ol>

    <button id="play-again">Play Again</button>
    <button id="back-to-menu-results">Main Menu</button>

    <div id="leaderboard-entry">


    </div>

    <div id="achievement-earned">


    </div>

  </div>

  <div id="leaderboard" class="hidden">

    <h2>Leaderboard</h2>

    <ol id="leaderboard-screen-list">


    </ol>

    <button id="back-to-main-menu-leaderboard">Main Menu</button>


  </div>

  <div id="achievements" class="hidden">

    <h2>Achievements</h2>

    <div id="achievements-list">

    </div>




    <button id="back-to-main-menu-achievements">Main Menu</button>


  </div>



  <script src="js/script.js"></script>

</body>

</html>
