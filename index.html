<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick Math</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- Main Menu -->
  <div id="main-menu" class="screen hidden">
    <h1>Quick Math</h1>

    <button id="start-game" class="btn">Start Game</button>
    <button id="show-leaderboard" class="btn">Leaderboard</button>
    <button id="show-achievements" class="btn">Achievements</button>

  </div>

  <div id="game" class="screen hidden">

    <p id="timer">60</p>
    <p id="score">0 Correct</p>

    <h2 id="problem">Problem Box</h2>

    <button id="option1" class="btn">Option 1</button>
    <button id="option2" class="btn">Option 2</button>
    <button id="option3" class="btn">Option 3</button>
    <button id="option4" class="btn">Option 4</button>

    <div id="penalty">

    </div>

  </div>

  <div id="results" class="screen hidden">

    <h2 class="header">Results</h2>

    <p id="player-score">0</p>

    <ol id="results-leaderboard-list">

    </ol>

    <button id="play-again" class="btn">Play Again</button>
    <button id="back-to-menu-results" class="btn">Main Menu</button>

    <div id="leaderboard-entry">


    </div>

    <div id="achievement-earned">


    </div>

  </div>

  <div id="leaderboard" class="screen hidden">

    <h2 class="header">Leaderboard</h2>

    <ol id="leaderboard-screen-list">
      <li>MSN - 40</li>
      <li>NTS - 38</li>
      <li>AMN - 36</li>
      <li>AMB - 30</li>
      <li>SJN - 28</li>
      <li>JJK - 26</li>
      <li>AAA - 24</li>
      <li>BBB - 22</li>
      <li>BBB - 22</li>
      <li>CCC - 20</li>
      <li>DDD - 15</li>
    </ol>

    <button id="back-to-main-menu-leaderboard" class="btn">Back to Main Menu</button>


  </div>

  <div id="achievements" class="screen hidden">

    <h2 class="header">Achievements</h2>

    <div id="achievements-list">
      <p class="achievement-item achievement-bronze"> Bronze</p>
      <p class="achievement-item achievement-flame"> Red Flame</p>

    </div>




    <button id="back-to-main-menu-achievements" class="btn">Main Menu</button>


  </div>



  <script src="js/script.js"></script>

</body>

</html>
